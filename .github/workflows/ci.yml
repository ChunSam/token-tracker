name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS build + smoke tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Smoke tests
        run: swift run TokenTrackerSmokeTests

  windows:
    name: Windows build + tests
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Core smoke tests
        run: dotnet run --project windows/TokenTracker.Windows.Tests/TokenTracker.Windows.Tests.csproj

      - name: Build WinForms app
        run: dotnet build windows/TokenTracker.Windows/TokenTracker.Windows.csproj -c Release

      # Release-path smoke: exercise the same self-contained single-file publish
      # the release workflow uses (windows-release.yml), so a publish-only quirk
      # is caught on every PR instead of surfacing only at release. win-x64 only
      # (primary target); win-arm64 remains validated by the release workflow.
      - name: Publish WinForms app (release-path smoke)
        run: >
          dotnet publish windows/TokenTracker.Windows/TokenTracker.Windows.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishReadyToRun=false
          -o ${{ runner.temp }}/publish-smoke
