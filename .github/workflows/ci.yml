name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  macos:
    name: macOS build + smoke tests
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: swift build

      - name: Smoke tests
        run: swift run TokenTrackerSmokeTests

  windows:
    name: Windows build + tests
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Core smoke tests
        run: dotnet run --project windows/TokenTracker.Windows.Tests/TokenTracker.Windows.Tests.csproj

      - name: Build WinForms app
        run: dotnet build windows/TokenTracker.Windows/TokenTracker.Windows.csproj -c Release
