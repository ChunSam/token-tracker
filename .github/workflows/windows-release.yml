name: Windows Release Build

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.0.3
        required: true
        default: v1.0.3

jobs:
  build:
    name: Build Windows ${{ matrix.rid }} exe
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Windows smoke tests
        run: dotnet run --project windows/TokenTracker.Windows.Tests/TokenTracker.Windows.Tests.csproj

      - name: Publish Windows app
        run: >
          dotnet publish windows/TokenTracker.Windows/TokenTracker.Windows.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishReadyToRun=false
          -o artifacts/TokenTracker.Windows-${{ matrix.rid }}

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path artifacts/TokenTracker.Windows-${{ matrix.rid }}/* `
            -DestinationPath "dist/TokenTracker.Windows-${{ inputs.version }}-${{ matrix.rid }}.zip" `
            -Force

      - name: Generate checksum
        shell: pwsh
        run: |
          $zip = "dist/TokenTracker.Windows-${{ inputs.version }}-${{ matrix.rid }}.zip"
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  " + (Split-Path $zip -Leaf) |
            Out-File -Encoding ascii "$zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTracker.Windows-${{ inputs.version }}-${{ matrix.rid }}
          path: dist/
          if-no-files-found: error
