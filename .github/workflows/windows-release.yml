name: Windows Release Build

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version, for example v1.0.3
        required: true
        default: v1.0.3

jobs:
  build:
    name: Build Windows exe
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run Windows smoke tests
        run: dotnet run --project windows/TokenTracker.Windows.Tests/TokenTracker.Windows.Tests.csproj

      - name: Publish Windows app
        run: >
          dotnet publish windows/TokenTracker.Windows/TokenTracker.Windows.csproj
          -c Release
          -r win-x64
          --self-contained true
          /p:PublishSingleFile=true
          /p:PublishReadyToRun=false
          -o artifacts/TokenTracker.Windows-win-x64

      - name: Package exe
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive `
            -Path artifacts/TokenTracker.Windows-win-x64/* `
            -DestinationPath "dist/TokenTracker.Windows-${{ inputs.version }}-win-x64.zip" `
            -Force

      - name: Generate checksum
        shell: pwsh
        run: |
          $zip = "dist/TokenTracker.Windows-${{ inputs.version }}-win-x64.zip"
          (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower() + "  " + (Split-Path $zip -Leaf) |
            Out-File -Encoding ascii "$zip.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: TokenTracker.Windows-${{ inputs.version }}-win-x64
          path: dist/
          if-no-files-found: error
